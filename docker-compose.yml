name: etask

x-log-policy: &log-policy
  driver: json-file
  options:
    max-size: "20m"
    max-file: "10"

x-database-environment: &database-environment
  PGHOST: postgres
  PGPORT: 5432
  PGUSER: etask
  PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  PGDATABASE: etask

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: etask
      POSTGRES_USER: etask
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./database/03-bootstrap.sh:/docker-entrypoint-initdb.d/03-bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U etask -d etask"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *log-policy

  api:
    image: etask:${ETASK_VERSION:-latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *database-environment
      PORT: 4000
    command: ["node","dist-server/index.js"]
    volumes:
      - uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD","node","-e","fetch('http://127.0.0.1:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *log-policy

  frontend:
    image: etask:${ETASK_VERSION:-latest}
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
    command: ["node","node_modules/vinext/dist/cli.js","start"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD","node","-e","fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *log-policy

  gateway:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "${ETASK_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","wget -q --spider http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *log-policy

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *database-environment
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      UPLOAD_SOURCE: /uploads
    command: ["/scripts/backup-loop.sh"]
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups
      - uploads:/uploads:ro
      - ./operations:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    logging: *log-policy

  restore:
    profiles: ["maintenance"]
    image: postgres:16-alpine
    environment:
      <<: *database-environment
    command: ["sh","-c","echo 'Specify a restore script explicitly' >&2; exit 1"]
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups:ro
      - uploads:/uploads
      - ./operations:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    logging: *log-policy

volumes:
  postgres_data:
  uploads:
