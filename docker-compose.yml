services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: etask
      POSTGRES_USER: etask
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U etask -d etask"]
      interval: 5s
      timeout: 5s
      retries: 12
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://etask:${POSTGRES_PASSWORD:-change-me}@postgres:5432/etask
    ports:
      - "3000:3000"
      - "4000:4000"
    volumes:
      - uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
  uploads:
